<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96" width="80" height="96">
  <!-- Shadow -->
  <ellipse cx="40" cy="93" rx="28" ry="6" fill="rgba(0,0,0,0.4)"/>
  <!-- Legs (thick) -->
  <rect x="22" y="62" width="14" height="24" rx="5" fill="#4a0072"/>
  <rect x="44" y="62" width="14" height="24" rx="5" fill="#4a0072"/>
  <!-- Boots -->
  <ellipse cx="29" cy="86" rx="11" ry="6" fill="#1a0025"/>
  <ellipse cx="51" cy="86" rx="11" ry="6" fill="#1a0025"/>
  <!-- Body (massive, armored) -->
  <rect x="14" y="26" width="52" height="40" rx="8" fill="#6a1b9a"/>
  <!-- Armor plates -->
  <rect x="18" y="30" width="20" height="14" rx="3" fill="#7b1fa2" opacity="0.7"/>
  <rect x="42" y="30" width="20" height="14" rx="3" fill="#7b1fa2" opacity="0.7"/>
  <rect x="18" y="48" width="44" height="12" rx="3" fill="#7b1fa2" opacity="0.5"/>
  <!-- Armor bolts -->
  <circle cx="22" cy="34" r="2" fill="#4a0072"/>
  <circle cx="34" cy="34" r="2" fill="#4a0072"/>
  <circle cx="46" cy="34" r="2" fill="#4a0072"/>
  <circle cx="58" cy="34" r="2" fill="#4a0072"/>
  <!-- Arms (huge) -->
  <rect x="0" y="28" width="18" height="14" rx="6" fill="#6a1b9a"/>
  <rect x="62" y="28" width="18" height="14" rx="6" fill="#6a1b9a"/>
  <!-- Fists -->
  <ellipse cx="5" cy="38" rx="7" ry="7" fill="#4a0072"/>
  <ellipse cx="75" cy="38" rx="7" ry="7" fill="#4a0072"/>
  <ellipse cx="5" cy="38" rx="4" ry="4" fill="#5c0085"/>
  <ellipse cx="75" cy="38" rx="4" ry="4" fill="#5c0085"/>
  <!-- Neck -->
  <rect x="30" y="17" width="20" height="12" rx="4" fill="#6a1b9a"/>
  <!-- Head (blocky, helmeted) -->
  <rect x="17" y="2" width="46" height="22" rx="8" fill="#6a1b9a"/>
  <!-- Helmet -->
  <rect x="16" y="2" width="48" height="12" rx="6" fill="#4a0072"/>
  <!-- Helmet strap -->
  <rect x="17" y="12" width="4" height="12" fill="#3a0060"/>
  <rect x="59" y="12" width="4" height="12" fill="#3a0060"/>
  <!-- Eye sockets (deep) -->
  <ellipse cx="30" cy="17" rx="7" ry="6" fill="#1a0025"/>
  <ellipse cx="50" cy="17" rx="7" ry="6" fill="#1a0025"/>
  <!-- Glowing red eyes -->
  <ellipse cx="30" cy="17" rx="4.5" ry="4" fill="#ff1744"/>
  <ellipse cx="50" cy="17" rx="4.5" ry="4" fill="#ff1744"/>
  <ellipse cx="30" cy="17" rx="2.5" ry="2.5" fill="#ff6d75"/>
  <ellipse cx="50" cy="17" rx="2.5" ry="2.5" fill="#ff6d75"/>
  <!-- Eye glow effect -->
  <ellipse cx="30" cy="17" rx="6" ry="5.5" fill="none" stroke="#ff1744" stroke-width="1" opacity="0.5"/>
  <ellipse cx="50" cy="17" rx="6" ry="5.5" fill="none" stroke="#ff1744" stroke-width="1" opacity="0.5"/>
  <!-- Mouth grill -->
  <rect x="25" y="22" width="30" height="6" rx="2" fill="#3a0060"/>
  <line x1="28" y1="22" x2="28" y2="28" stroke="#4a0072" stroke-width="1.5"/>
  <line x1="33" y1="22" x2="33" y2="28" stroke="#4a0072" stroke-width="1.5"/>
  <line x1="40" y1="22" x2="40" y2="28" stroke="#4a0072" stroke-width="1.5"/>
  <line x1="47" y1="22" x2="47" y2="28" stroke="#4a0072" stroke-width="1.5"/>
  <line x1="52" y1="22" x2="52" y2="28" stroke="#4a0072" stroke-width="1.5"/>
</svg>
