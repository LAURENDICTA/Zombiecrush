<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 76" width="56" height="76">
  <!-- Shadow -->
  <ellipse cx="28" cy="73" rx="14" ry="4" fill="rgba(0,0,0,0.35)"/>
  <!-- Legs (running pose) -->
  <rect x="17" y="48" width="8" height="20" rx="3" fill="#1b5e20" transform="rotate(-10 21 58)"/>
  <rect x="27" y="48" width="8" height="20" rx="3" fill="#1b5e20" transform="rotate(15 31 58)"/>
  <!-- Shoes -->
  <ellipse cx="20" cy="68" rx="6" ry="3.5" fill="#0a0a00"/>
  <ellipse cx="33" cy="70" rx="6" ry="3.5" fill="#0a0a00"/>
  <!-- Body (hunched forward) -->
  <rect x="16" y="22" width="24" height="28" rx="5" fill="#2e7d32" transform="rotate(-8 28 36)"/>
  <!-- Speed lines / shirt tears -->
  <line x1="16" y1="30" x2="22" y2="28" stroke="#1b5e20" stroke-width="1.5"/>
  <line x1="16" y1="35" x2="21" y2="34" stroke="#1b5e20" stroke-width="1.5"/>
  <!-- Arms (pumping) -->
  <rect x="4" y="24" width="16" height="7" rx="3" fill="#2e7d32" transform="rotate(25 12 27)"/>
  <rect x="36" y="30" width="16" height="7" rx="3" fill="#2e7d32" transform="rotate(-20 44 33)"/>
  <!-- Hands -->
  <ellipse cx="7" cy="30" rx="4" ry="4" fill="#1b5e20"/>
  <ellipse cx="52" cy="27" rx="4" ry="4" fill="#1b5e20"/>
  <!-- Neck -->
  <rect x="24" y="14" width="9" height="10" rx="3" fill="#2e7d32" transform="rotate(-5 28 19)"/>
  <!-- Head (tilted aggressive) -->
  <ellipse cx="29" cy="11" rx="13" ry="12" fill="#2e7d32" transform="rotate(-8 29 11)"/>
  <!-- Eyes - red/angry -->
  <ellipse cx="24" cy="10" rx="3.5" ry="3.5" fill="#0d0000"/>
  <ellipse cx="34" cy="10" rx="3.5" ry="3.5" fill="#0d0000"/>
  <ellipse cx="24" cy="10" rx="2" ry="2.5" fill="#ff6f00"/>
  <ellipse cx="34" cy="10" rx="2" ry="2.5" fill="#ff6f00"/>
  <ellipse cx="24" cy="9.5" rx="1" ry="1.5" fill="#ffcc02" opacity="0.9"/>
  <ellipse cx="34" cy="9.5" rx="1" ry="1.5" fill="#ffcc02" opacity="0.9"/>
  <!-- Angry brow lines -->
  <line x1="21" y1="7" x2="27" y2="8.5" stroke="#1b5e20" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="7" x2="31" y2="8.5" stroke="#1b5e20" stroke-width="2" stroke-linecap="round"/>
  <!-- Snarl mouth -->
  <path d="M22 17 Q28 15 36 17" stroke="#0d0000" stroke-width="1.5" fill="none"/>
  <rect x="26" y="16" width="2.5" height="3" fill="#ddd" rx="0.5"/>
  <rect x="30" y="15.5" width="2" height="2.5" fill="#ddd" rx="0.5"/>
</svg>
