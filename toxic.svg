<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 68 84" width="68" height="84">
  <!-- Toxic drip pools on ground -->
  <ellipse cx="34" cy="82" rx="22" ry="5" fill="#76ff03" opacity="0.25"/>
  <ellipse cx="22" cy="80" rx="6" ry="2.5" fill="#76ff03" opacity="0.2"/>
  <ellipse cx="48" cy="81" rx="5" ry="2" fill="#76ff03" opacity="0.2"/>
  <!-- Shadow -->
  <ellipse cx="34" cy="81" rx="18" ry="4" fill="rgba(0,0,0,0.3)"/>
  <!-- Dripping toxic legs -->
  <rect x="22" y="54" width="10" height="22" rx="4" fill="#558b2f"/>
  <rect x="36" y="54" width="10" height="22" rx="4" fill="#558b2f"/>
  <!-- Ooze drips on legs -->
  <ellipse cx="27" cy="76" rx="4" ry="3" fill="#76ff03" opacity="0.6"/>
  <ellipse cx="41" cy="75" rx="3.5" ry="2.5" fill="#76ff03" opacity="0.5"/>
  <!-- Feet (melting) -->
  <ellipse cx="27" cy="78" rx="9" ry="4" fill="#33691e"/>
  <ellipse cx="41" cy="78" rx="9" ry="4" fill="#33691e"/>
  <!-- Body (bloated, mutated) -->
  <ellipse cx="34" cy="38" rx="24" ry="20" fill="#558b2f"/>
  <!-- Toxic boils on body -->
  <circle cx="20" cy="36" r="5" fill="#76ff03" opacity="0.7"/>
  <circle cx="48" cy="32" r="4" fill="#76ff03" opacity="0.6"/>
  <circle cx="40" cy="46" r="3.5" fill="#76ff03" opacity="0.5"/>
  <circle cx="24" cy="48" r="3" fill="#76ff03" opacity="0.5"/>
  <!-- Boil highlights -->
  <circle cx="19" cy="35" r="2" fill="#ccff90" opacity="0.5"/>
  <circle cx="47" cy="31" r="1.5" fill="#ccff90" opacity="0.4"/>
  <!-- Arms (dripping) -->
  <rect x="2" y="30" width="20" height="10" rx="5" fill="#558b2f" transform="rotate(-20 12 35)"/>
  <rect x="46" y="30" width="20" height="10" rx="5" fill="#558b2f" transform="rotate(20 56 35)"/>
  <!-- Drips from arms -->
  <ellipse cx="4" cy="38" rx="4" ry="5" fill="#558b2f"/>
  <path d="M4 42 Q4 50 5 54" stroke="#76ff03" stroke-width="2" fill="none" opacity="0.7"/>
  <ellipse cx="64" cy="36" rx="4" ry="5" fill="#558b2f"/>
  <path d="M64 40 Q64 48 63 52" stroke="#76ff03" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Toxic fumes (bubbles above) -->
  <circle cx="26" cy="12" r="4" fill="#76ff03" opacity="0.35"/>
  <circle cx="36" cy="8" r="3" fill="#c6ff00" opacity="0.3"/>
  <circle cx="46" cy="11" r="3.5" fill="#76ff03" opacity="0.28"/>
  <circle cx="30" cy="6" r="2" fill="#ccff90" opacity="0.25"/>
  <!-- Neck -->
  <rect x="28" y="16" width="14" height="10" rx="4" fill="#558b2f"/>
  <!-- Head (lumpy) -->
  <ellipse cx="34" cy="13" rx="17" ry="15" fill="#558b2f"/>
  <!-- Head mutations -->
  <circle cx="22" cy="10" r="3.5" fill="#76ff03" opacity="0.6"/>
  <circle cx="46" cy="8" r="3" fill="#76ff03" opacity="0.5"/>
  <!-- Eye sockets -->
  <ellipse cx="28" cy="13" rx="5" ry="5.5" fill="#1a2600"/>
  <ellipse cx="40" cy="13" rx="5" ry="5.5" fill="#1a2600"/>
  <!-- Toxic yellow-green eyes -->
  <ellipse cx="28" cy="13" rx="3.5" ry="4" fill="#c6ff00"/>
  <ellipse cx="40" cy="13" rx="3.5" ry="4" fill="#c6ff00"/>
  <ellipse cx="28" cy="12.5" rx="2" ry="2.5" fill="#e6ff66" opacity="0.9"/>
  <ellipse cx="40" cy="12.5" rx="2" ry="2.5" fill="#e6ff66" opacity="0.9"/>
  <!-- Glow rings -->
  <ellipse cx="28" cy="13" rx="5.5" ry="6" fill="none" stroke="#c6ff00" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="40" cy="13" rx="5.5" ry="6" fill="none" stroke="#c6ff00" stroke-width="0.8" opacity="0.5"/>
  <!-- Mouth (oozing) -->
  <path d="M24 21 Q34 26 44 21" fill="#1a2600" stroke="#1a2600" stroke-width="1"/>
  <path d="M27 21 Q28 25 30 26" stroke="#76ff03" stroke-width="1.5" fill="none" opacity="0.8"/>
  <path d="M37 21 Q38 25 40 25" stroke="#76ff03" stroke-width="1.5" fill="none" opacity="0.8"/>
  <!-- Hazard symbol hint on chest -->
  <circle cx="34" cy="38" r="7" fill="none" stroke="#c6ff00" stroke-width="1.5" opacity="0.4"/>
  <text x="34" y="42" text-anchor="middle" font-size="10" fill="#c6ff00" opacity="0.5" font-family="sans-serif">☣</text>
</svg>
